# Eclipse Mosquitto 2.x config — sauna-monitor

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type notice
log_type warning
log_type error
log_type information

# Authentication & ACL
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# ── Plaintext listener (LOCAL DEV ONLY) ───────────────────────────────────
listener 1883
protocol mqtt

# ── TLS listener (production) ─────────────────────────────────────────────
listener 8883
protocol mqtt
certfile   /mosquitto/certs/fullchain.pem
keyfile    /mosquitto/certs/privkey.pem
tls_version tlsv1.2

# ── WebSocket listener (optional, for live tile updates) ──────────────────
# Disabled in prod for now; re-enable with TLS (wss) once cert is in place.
# listener 8884
# protocol websockets
