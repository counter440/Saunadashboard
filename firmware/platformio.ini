; LILYGO T-SIM7080G-S3 v1.0 — Ember sauna firmware
;
; Profiles:
;   dev_wifi    bench dev: Wi-Fi + ArduinoOTA + 30s cadence, no deep sleep
;   prod_wifi   production-flavoured Wi-Fi: 30 min cadence, deep sleep
;   prod_lte    production over LTE-M with PSM (Phase C/D)
;
; Build:  pio run -e dev_wifi
; Upload: pio run -e dev_wifi -t upload
; Monitor: pio device monitor -b 115200

[platformio]
default_envs = dev_wifi
src_dir = src
include_dir = include

[env]
platform = espressif32@^6.9.0
framework = arduino
board = esp32-s3-devkitc-1
board_build.partitions = partitions_dual_app.csv
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 16MB
board_build.mcu = esp32s3
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    https://github.com/adafruit/Adafruit_MAX31865.git
    adafruit/Adafruit BusIO @ ^1.16.0
    bblanchon/ArduinoJson @ ^7.4.1
    knolleary/PubSubClient @ ^2.8

[env:dev_wifi]
build_flags =
    ${env.build_flags}
    -DBUILD_WIFI=1
    -DDEBUG_BUILD=1

[env:prod_wifi]
build_flags =
    ${env.build_flags}
    -DBUILD_WIFI=1

[env:prod_lte]
build_flags =
    ${env.build_flags}
    -DBUILD_LTE=1
    -DTINY_GSM_MODEM_SIM7080
lib_deps =
    ${env.lib_deps}
    vshymanskyy/TinyGSM @ ^0.12.0
    vshymanskyy/StreamDebugger @ ^1.0.1
